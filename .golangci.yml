version: "2"

run:
  build-tags:
    - integration
  tests: true
  allow-parallel-runners: true

linters:
  enable:
    - bidichk
    - bodyclose
    - cyclop
    - depguard
    - dogsled
    - dupl
    - durationcheck
    - errname
    - errorlint
    - forcetypeassert
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - promlinter
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 30
      package-average: 5
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/arsham/figurine/v2
            - github.com/arsham/rainbow/v2
    godot:
      capital: true
    misspell:
      locale: UK
    staticcheck:
      checks:
        - all
    unparam:
      check-exported: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec
      - path: (.+)_test\.go
        linters:
          - cyclop
      - path: fonts\.go
        linters:
          - misspell
    paths:
      - ^tmp/
      - ^bin/
      - ^scripts/
      - third_party$
      - builtin$
      - examples$

issues:
  fix: true

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/arsham/figurine/v2
  exclusions:
    generated: lax
    paths:
      - ^tmp/
      - ^bin/
      - ^scripts/
      - third_party$
      - builtin$
      - examples$
